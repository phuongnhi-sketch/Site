<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Management - MASTER POC v2.0 (Pipeline & Versioning)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary-color: #1E293B; --accent-blue: #2563EB; --accent-azure: #0EA5E9;
            --bg-main: #F8FAFC; --text-main: #1E293B; --text-muted: #64748B;
            --border-glass: rgba(0, 0, 0, 0.05); --grad-primary: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            --radius-md: 16px; --radius-lg: 24px; --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.04);
            --font-heading: 'Outfit', sans-serif; --font-body: 'Inter', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font-body); background: var(--bg-main); color: var(--text-main); min-height: 100vh; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.78); backdrop-filter: blur(25px); border: 1px solid var(--border-glass); box-shadow: var(--shadow-soft); }
        .layout-container { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 80px 1fr; height: 100vh; padding: 1.5rem; gap: 1.5rem; }
        .navbar { grid-column: 1 / span 2; border-radius:18px; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; }
        .sidebar { border-radius: 18px; display: flex; flex-direction: column; padding: 0.8rem; }
        .menu-item { display:flex; align-items:center; gap:1.1rem; padding:1.1rem 1.4rem; border-radius:14px; color:var(--text-muted); text-decoration:none; transition:0.3s; font-weight:600; cursor:pointer; }
        .menu-item.active { background: white; color: var(--accent-blue); box-shadow: 0 6px 20px rgba(0,0,0,0.06); }
        .main-content { border-radius: 18px; padding: 2rem; overflow-y: auto; }
        
        .data-table { width: 100%; border-collapse: collapse; text-align: left; background:white; }
        .data-table th { padding: 1.2rem; background:#F8FAFC; color:var(--text-muted); font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border-glass); }
        .data-table td { padding: 1.1rem; border-bottom:1px solid var(--border-glass); font-size:0.9rem; }
        
        .status-pill { padding: 0.4rem 1rem; border-radius: 100px; font-size:0.7rem; font-weight:700; text-transform:uppercase; border: 1px solid rgba(0,0,0,0.05); }
        .status-DRAFT { background: #F1F5F9; color: #64748B; }
        .status-SUBMITTED { background: #E0F2FE; color: #0369A1; }
        .status-GATE1 { background: #F3E8FF; color: #7E22CE; } /* Survey */
        .status-GATE2 { background: #DBEAFE; color: #1E40AF; } /* Sitepack */
        .status-GATE3 { background: #FEF3C7; color: #B45309; } /* Deal */
        .status-FINISH { background: #DCFCE7; color: #15803D; } /* Complete */
        
        .btn-primary { background: var(--grad-primary); color: white; padding: 1rem; border: none; border-radius: 14px; font-weight: 700; cursor:pointer; }
        .btn-ghost { background: none; border: 1px solid #ddd; padding: 0.6rem 1rem; border-radius: 10px; cursor:pointer; font-weight:600; }
        
        .animate-fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        
        /* Specific detail styles */
        .comment-item { margin-bottom: 1.2rem; padding: 1rem; border-radius: 12px; background: #F8FAFC; border: 1px solid #f1f1f1; }
        
        /* Hide arrows for number inputs */
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        #map-container { height: 600px; width: 100%; border-radius: 24px; overflow: hidden; box-shadow: var(--shadow-soft); border: 4px solid white; }
        .map-filter-panel { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // --- DATA LAYER ---
        const INIT_FIELDS = [
            { id: 'f0', label: 'Brand', type: 'checkboxes', options: ['TPC', 'DQ', 'SW', 'CHANG'], is_active: true, req: true },
            { id: 'f1', label: 'Mã mặt bằng', type: 'text', is_active: true, req: true },
            { id: 'f6', label: 'Địa chỉ (Số nhà)', type: 'text', is_active: true, req: true },
            { id: 'f3', label: 'Google map', type: 'text', is_active: true, req: true },
            { id: 'f13', label: 'Bên cho thuê', type: 'select', options: ['Cá nhân', 'Pháp nhân'], is_active: true, req: true },
            { id: 'f2_3', label: 'Bên khai và trả thuế', type: 'select', options: ['Chủ nhà', 'QSR'], is_active: true, req: true },
            { id: 'f14', label: 'Thời hạn thuê (năm)', type: 'text', is_active: true, req: true, num: true },
            { id: 'f2_1', label: 'Giá thuê chưa thuế (VD: 1,000,000)', type: 'text', is_active: true, req: true, num: true },
            { id: 'f2_2', label: 'Giá thuê có thuế (VD: 1,000,000)', type: 'text', is_active: true, req: true, num: true },
            { id: 'f8', label: 'Biên độ tăng giá', type: 'textarea', is_active: true, req: true },
            { id: 'f7', label: 'Cọc - Thanh toán', type: 'textarea', is_active: true, req: true },
            { id: 'f4', label: 'Mặt tiền (m)', type: 'text', is_active: true, req: true, num: true },
            { id: 'f5', label: 'Tổng diện tích cho thuê (m2)', type: 'text', is_active: true, req: true, num: true },
            { id: 'f9', label: 'Mô tả khác (VD: Kết cấu, hiện trạng,..)', type: 'textarea', is_active: true, req: true },
            { id: 'f11', label: 'Điều kiện kỹ thuật', type: 'textarea', is_active: true, req: true },
            { id: 'f10_2', label: 'Ngày nhận nhà', type: 'text', is_active: true, req: true },
            { id: 'f10_1', label: 'Thời gian miễn phí xây dựng', type: 'text', is_active: true, req: true }
        ];

        const STATUS_LABELS = {
            'DRAFT': 'Draft',
            'SUBMITTED': 'Submitted',
            'GATE1': 'Survey',
            'GATE2': 'Sitepack',
            'GATE3': 'Deal',
            'FINISH': 'Complete'
        };

        const FormService = {
            getFields: (all = false) => {
                const fs = JSON.parse(localStorage.getItem('site_poc_fields_v9')) || INIT_FIELDS;
                return all ? fs : fs.filter(f => f.is_active);
            },
            saveFields: (fs) => localStorage.setItem('site_poc_fields_v9', JSON.stringify(fs)),
            updateField: (id, updates) => {
                const fs = FormService.getFields(true);
                const idx = fs.findIndex(f => f.id === id);
                if (idx > -1) { fs[idx] = { ...fs[idx], ...updates }; FormService.saveFields(fs); }
            }
        };

        const SiteService = {
            getSites: () => JSON.parse(localStorage.getItem('site_poc_sites')) || [
                { id: '1', code: 'MB-2024-001', name: 'Nhà Thuốc 3/2', brand: 'TPC', addr: 'Quận 10, HCM', thumb: 'https://images.unsplash.com/photo-1541339905195-266293a20131?w=400&h=400', region: 'SOUTH', price: 95000000, date: '15/04/2024', status: 'SUBMITTED', owner: 'system', comments: [], mpsa_history: [] }
            ],
            save: (site) => {
                const ss = SiteService.getSites();
                const isNew = !ss.find(s => s.id === site.id);
                const idx = ss.findIndex(s => s.id === site.id);
                if (idx > -1) ss[idx] = { ...ss[idx], ...site };
                else ss.push({ ...site, id: site.id || Date.now().toString(), comments: [] });
                try {
                    localStorage.setItem('site_poc_sites', JSON.stringify(ss));
                    if (isNew) {
                        const sBrand = site.brand || (site.answers && site.answers.f0);
                        // Notify ADMIN & BOD L1
                        NotificationService.add('admin-all', `🚀 Site mới: ${site.name} vừa được nộp!`, site.id);
                        NotificationService.add('bod_l1-all', `🚀 Site mới: ${site.name} vừa được nộp!`, site.id);
                        
                        // Notify BOD L2 of the same brand
                        const brandList = Array.from(new Set((sBrand || '').split(',').map(b=>b.trim()).filter(b=>b)));
                        let addedDQ_SW = false;
                        brandList.forEach(b => {
                            if (b === 'DQ' || b === 'SW') {
                                if (!addedDQ_SW) {
                                    NotificationService.add('bod_l2-all-dq', `🚀 Site mới: ${site.name} (${sBrand}) vừa được nộp!`, site.id);
                                    NotificationService.add('bod_l2-all-sw', `🚀 Site mới: ${site.name} (${sBrand}) vừa được nộp!`, site.id);
                                    addedDQ_SW = true;
                                }
                            } else {
                                NotificationService.add(`bod_l2-all-${b.toLowerCase()}`, `🚀 Site mới: ${site.name} vừa được nộp!`, site.id);
                            }
                        });
                    }
                    return true;
                } catch(e) {
                    alert('Lỗi: Trình duyệt bị đầy bộ nhớ (QuotaExceededError) do ảnh quá nhiều hoặc chưa được nén đủ. Không thể lưu hồ sơ.');
                    return false;
                }
            },
            updateStatus: (id, status, commentText) => {
                const ss = SiteService.getSites();
                const idx = ss.findIndex(s => s.id === id);
                if (idx > -1) {
                    const oldStatus = ss[idx].status;
                    ss[idx].status = status;
                    if (commentText) {
                        if(!ss[idx].comments) ss[idx].comments = [];
                        ss[idx].comments.push({ 
                            author: 'Hệ thống', 
                            text: commentText, 
                            date: new Date().toISOString(),
                            stage: oldStatus 
                        });
                    }
                    localStorage.setItem('site_poc_sites', JSON.stringify(ss));
                    const sBrand = ss[idx].brand || (ss[idx].answers && ss[idx].answers.f0);
                    // Notify Owner, Admin & BOD L1
                    NotificationService.add(ss[idx].owner.toLowerCase(), `🔄 Hồ sơ ${ss[idx].name} chuyển sang: ${STATUS_LABELS[status]}`, ss[idx].id);
                    NotificationService.add('admin-all', `🔄 Hồ sơ ${ss[idx].name} chuyển sang: ${STATUS_LABELS[status]}`, ss[idx].id);
                    NotificationService.add('bod_l1-all', `🔄 Hồ sơ ${ss[idx].name} chuyển sang: ${STATUS_LABELS[status]}`, ss[idx].id);

                    // Notify Project Team ONLY when moving to Survey (GATE1)
                    if (status === 'GATE1') {
                        NotificationService.add('project-all', `👷 Site mới cần khảo sát: ${ss[idx].name}`, ss[idx].id);
                    }

                    // Notify BOD L2
                    if (sBrand === 'DQ' || sBrand === 'SW') {
                        NotificationService.add('bod_l2-all-dq', `🔄 Hồ sơ ${ss[idx].name} (${sBrand}) chuyển sang: ${STATUS_LABELS[status]}`, ss[idx].id);
                        NotificationService.add('bod_l2-all-sw', `🔄 Hồ sơ ${ss[idx].name} (${sBrand}) chuyển sang: ${STATUS_LABELS[status]}`, ss[idx].id);
                    } else {
                        NotificationService.add(`bod_l2-all-${sBrand.toLowerCase()}`, `🔄 Hồ sơ ${ss[idx].name} chuyển sang: ${STATUS_LABELS[status]}`, ss[idx].id);
                    }
                }
            },
            addComment: (id, text, author) => {
                const ss = SiteService.getSites();
                const idx = ss.findIndex(s => s.id === id);
                if (idx > -1) {
                    if(!ss[idx].comments) ss[idx].comments = [];
                    ss[idx].comments.push({ 
                        author, 
                        text, 
                        date: new Date().toISOString(),
                        stage: ss[idx].status // Lưu stage tại thời điểm comment
                    });
                    localStorage.setItem('site_poc_sites', JSON.stringify(ss));
                    // Notify Owner & Admin if comment is from someone else
                    if (author !== ss[idx].owner_name) {
                        NotificationService.add(ss[idx].owner.toLowerCase(), `💬 ${author} vừa bình luận trong hồ sơ ${ss[idx].name}`, ss[idx].id);
                    }
                    if (author !== 'Chị Nhi') {
                        NotificationService.add('admin-all', `💬 ${author} vừa bình luận trong hồ sơ ${ss[idx].name}`, ss[idx].id);
                    }
                }
            },
            updateMPSA: (id, value, note) => {
                const ss = SiteService.getSites();
                const idx = ss.findIndex(s => s.id === id);
                if (idx > -1) {
                    if(!ss[idx].mpsa_history) ss[idx].mpsa_history = [];
                    ss[idx].mpsa_history.push({ value, note, date: new Date().toISOString() });
                    ss[idx].current_mpsa = value;
                    localStorage.setItem('site_poc_sites', JSON.stringify(ss));
                }
            },
            createVersion2: (id) => {
                const ss = SiteService.getSites();
                const idx = ss.findIndex(s => s.id === id);
                if (idx > -1) {
                    ss[idx].v2_data = JSON.parse(JSON.stringify(ss[idx].answers)); // Deep clone
                    localStorage.setItem('site_poc_sites', JSON.stringify(ss));
                }
            },
            getLatestData: (site) => {
                return site.v2_data || site.answers || {};
            }
        };

        const NotificationService = {
            getNotifs: () => JSON.parse(localStorage.getItem('site_poc_notifs')) || [],
            add: (uId, msg, sId) => {
                const ns = NotificationService.getNotifs();
                ns.unshift({ id: Date.now(), uId, msg, sId, date: new Date().toISOString(), isRead: false });
                localStorage.setItem('site_poc_notifs', JSON.stringify(ns.slice(0, 50))); // Keep 50
            },
            markRead: (id) => {
                const ns = NotificationService.getNotifs();
                const idx = ns.findIndex(n => n.id === id);
                if(idx > -1) { ns[idx].isRead = true; localStorage.setItem('site_poc_notifs', JSON.stringify(ns)); }
            },
            getUnreadCount: (uId) => NotificationService.getNotifs().filter(n => n.uId === uId && !n.isRead).length
        };

        const UserService = {
            getUsers: () => JSON.parse(localStorage.getItem('site_poc_users')) || [
                { id: 'admin', username: 'admin', password: '123', name: 'Chị Nhi', role: 'ADMIN', region: 'ALL', brand: 'ALL', email: 'admin@system.com' },
                { id: 'mb_north', username: 'mb_north', password: '123', name: 'Team MB North', role: 'MB', region: 'NORTH', brand: 'ALL', email: 'mb.north@system.com' }
            ],
            saveUser: (user) => {
                const users = UserService.getUsers();
                const idx = users.findIndex(u => u.id === user.id);
                if(idx > -1) users[idx] = { ...users[idx], ...user };
                else users.push({ ...user, id: user.id || Date.now().toString() });
                localStorage.setItem('site_poc_users', JSON.stringify(users));
            },
            deleteUser: (id) => {
                let users = UserService.getUsers();
                users = users.filter(u => u.id !== id);
                localStorage.setItem('site_poc_users', JSON.stringify(users));
            }
        };

        const store = {
            state: { user: JSON.parse(localStorage.getItem('site_poc_user')) },
            getState() { return this.state; }
        };

        // --- VIEWS ---
        const DashboardView = { render: () => {
            const u = store.getState().user;
            // Áp dụng bộ lọc phân quyền cho Dashboard
            const ss = SiteService.getSites().filter(s => {
                if (s.status === 'DRAFT') return s.owner === u.id || u.role === 'ADMIN';
                if (u.role === 'ADMIN' || u.role === 'BOD_L1') return true;
                if (u.role === 'BOD_L2') {
                    if (s.status === 'FINISH') return true;
                    const sBrand = s.brand || s.answers?.f0 || '';
                    if (['DQ', 'SW'].includes(u.brand)) return sBrand.includes('DQ') || sBrand.includes('SW');
                    return sBrand.includes(u.brand);
                }
                if (u.role === 'PROJECT') return ['GATE1', 'GATE2', 'GATE3', 'FINISH'].includes(s.status);
                return u.role === 'MB' ? s.region === u.region : false;
            });
            
            const mySites = ss.filter(s => s.owner === u.id);
            const submitted = ss.filter(s => s.status === 'SUBMITTED').length;
            const gate1 = ss.filter(s => s.status === 'GATE1').length;
            const gate2 = ss.filter(s => s.status === 'GATE2').length;
            const gate3 = ss.filter(s => s.status === 'GATE3').length;
            const finished = ss.filter(s => s.status === 'FINISH').length;
            const draft = ss.filter(s => s.status === 'DRAFT').length;

            const feedbackCount = mySites.filter(s => (s.status === 'DRAFT' || s.status === 'GATE1') && s.comments && s.comments.length > 0).length;

            return `
            <div class="animate-fade-in">
                ${(u.role === 'MB' && feedbackCount > 0) ? `
                <div style="background:#FEF2F2; border-left:4px solid #EF4444; padding:1.5rem; border-radius:12px; margin-bottom:2rem; box-shadow:var(--shadow-soft); display:flex; align-items:center; gap:1rem;">
                    <span style="font-size:2.5rem;">🔔</span>
                    <div>
                        <h3 style="color:#991B1B; margin-bottom:0.2rem;">Thông báo phản hồi</h3>
                        <p style="color:#B91C1C;">Bạn có <strong>${feedbackCount}</strong> hồ sơ đang có phản hồi/yêu cầu sửa từ sếp. Vui lòng kiểm tra danh sách hồ sơ!</p>
                    </div>
                </div>` : ''}
                <div class="glass" style="padding:3.5rem; border-radius:30px; background:var(--grad-primary); color:white; margin-bottom:2.5rem; box-shadow:0 15px 40px rgba(37,99,235,0.15)">
                    <h1 style="font-size:2.8rem; margin-bottom:0.5rem; font-family:var(--font-heading)">Xin chào Nhi! 👋</h1>
                    <p style="opacity:0.9; font-weight:500; font-size:1.1rem">Hệ thống Master POC v2.0 đang hoạt động ổn định và tối ưu.</p>
                </div>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:1.5rem">
                    <div class="glass" style="padding:2.2rem; border-radius:24px; border-bottom:6px solid var(--accent-blue)">
                        <h2 style="font-size:2.5rem; color:var(--primary-color)">${submitted}</h2>
                        <p style="color:var(--text-muted); font-weight:600; font-size:0.9rem; text-transform:uppercase; margin-top:0.5rem">Submitted</p>
                    </div>
                    <div class="glass" style="padding:2.2rem; border-radius:24px; border-bottom:6px solid #7E22CE">
                        <h2 style="font-size:2.5rem; color:var(--primary-color)">${gate1}</h2>
                        <p style="color:var(--text-muted); font-weight:600; font-size:0.9rem; text-transform:uppercase; margin-top:0.5rem">Survey</p>
                    </div>
                    <div class="glass" style="padding:2.2rem; border-radius:24px; border-bottom:6px solid var(--accent-azure)">
                        <h2 style="font-size:2.5rem; color:var(--primary-color)">${gate2}</h2>
                        <p style="color:var(--text-muted); font-weight:600; font-size:0.9rem; text-transform:uppercase; margin-top:0.5rem">Sitepack</p>
                    </div>
                    <div class="glass" style="padding:2.2rem; border-radius:24px; border-bottom:6px solid #B45309">
                        <h2 style="font-size:2.5rem; color:var(--primary-color)">${gate3}</h2>
                        <p style="color:var(--text-muted); font-weight:600; font-size:0.9rem; text-transform:uppercase; margin-top:0.5rem">Deal</p>
                    </div>
                    <div class="glass" style="padding:2.2rem; border-radius:24px; border-bottom:6px solid #10B981">
                        <h2 style="font-size:2.5rem; color:var(--primary-color)">${finished}</h2>
                        <p style="color:var(--text-muted); font-weight:600; font-size:0.9rem; text-transform:uppercase; margin-top:0.5rem">Complete</p>
                    </div>
                    <div class="glass" style="padding:2.2rem; border-radius:24px; border-bottom:6px solid #64748B">
                        <h2 style="font-size:2.5rem; color:var(--primary-color)">${draft}</h2>
                        <p style="color:var(--text-muted); font-weight:600; font-size:0.9rem; text-transform:uppercase; margin-top:0.5rem">Bản nháp</p>
                    </div>
                </div>
            </div>`; 
        } };

        const SiteListView = {
            render: () => {
                const u = store.getState().user;
                const filters = window.siteFilters || { search: '', region: 'ALL', brand: 'ALL', status: 'ALL' };
                const sites = SiteService.getSites().filter(s => {
                    if (s.status === 'DRAFT') return s.owner === u.id || u.role === 'ADMIN';
                    if (u.role === 'ADMIN' || u.role === 'BOD_L1') return true;
                    if (u.role === 'BOD_L2') {
                        if (s.status === 'FINISH') return true;
                        const sBrand = s.brand || s.answers?.f0 || '';
                        if (['DQ', 'SW'].includes(u.brand)) return sBrand.includes('DQ') || sBrand.includes('SW');
                        return sBrand.includes(u.brand);
                    }
                    if (u.role === 'PROJECT') return ['GATE1', 'GATE2', 'GATE3', 'FINISH'].includes(s.status);
                    return u.role === 'MB' ? s.region === u.region : false;
                }).filter(s => {
                    const sBrand = s.brand || s.answers?.f0 || '';
                    const matchSearch = s.name.toLowerCase().includes(filters.search.toLowerCase()) || (s.code && s.code.toLowerCase().includes(filters.search.toLowerCase()));
                    const matchRegion = filters.region === 'ALL' || s.region === filters.region;
                    const matchBrand = filters.brand === 'ALL' || sBrand.includes(filters.brand);
                    const matchStatus = filters.status === 'ALL' || s.status === filters.status;
                    return matchSearch && matchRegion && matchBrand && matchStatus;
                }).reverse();

                return `
                    <div class="animate-fade-in">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2.5rem">
                            <h1>📍 Danh sách hồ sơ</h1>
                            <div style="display:flex; gap:10px; align-items:center">
                                <div style="display:flex; flex-direction:column; gap:6px; margin-right:10px; padding:8px; background:#F8FAFC; border-radius:12px; border:1px solid #eee">
                                    <div style="display:flex; align-items:center; gap:8px; font-size:0.75rem; font-weight:700; color:var(--text-muted)">
                                        <input type="checkbox" id="include-qa" style="width:14px; height:14px; cursor:pointer"> <label for="include-qa" style="cursor:pointer">Kèm thảo luận</label>
                                    </div>

        const MapView = {
            render: () => {
                const u = store.getState().user;
                return `
                    <div class="animate-fade-in">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem">

                                <select id="f-status" class="btn-ghost" style="padding:0.8rem; background:white" onchange="window.refreshMap()">

                                <select id="f-brand" class="btn-ghost" style="padding:0.8rem; background:white" onchange="window.refreshMap()">

                        </div>
                    </div>`;
            },
            init: () => {
                const u = store.getState().user;
                const map = L.map('map-container').setView([10.762622, 106.660172], 13); // Default HCM
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                window.mapInstance = map;
                window.markerGroup = L.layerGroup().addTo(map);
                window.refreshMap();
            }
        };

        window.refreshMap = () => {
            if(!window.mapInstance) return;
            window.markerGroup.clearLayers();
            const u = store.getState().user;
            const stF = document.getElementById('f-status')?.value || 'ALL';
            const brF = document.getElementById('f-brand')?.value || 'ALL';

            const sites = SiteService.getSites().filter(s => {
                if (stF !== 'ALL' && s.status !== stF) return false;
                const sBrand = s.brand || s.answers?.f0;
                if (brF !== 'ALL' && sBrand !== brF) return false;
                
                // RBAC
                if (u.role === 'BOD_L2' && s.status !== 'FINISH') {
                    if (['DQ', 'SW'].includes(u.brand)) { if(!['DQ', 'SW'].includes(sBrand)) return false; }
                    else if (sBrand !== u.brand) return false;
                }
                if (u.role === 'PROJECT' && !['GATE1','GATE2','GATE3','FINISH'].includes(s.status)) return false;
                if (u.role === 'MB' && s.region !== u.region) return false;
                return true;
            });

            sites.forEach(s => {
                const data = SiteService.getLatestData(s);
                if (data.f3) {
                    // Extract lat/lng from Google maps link or use random near HCM for demo
                    // Simple regex for lat/lng: @(10\.\d+),(106\.\d+)
                    let lat = 10.76 + (Math.random() - 0.5) * 0.1;
                    let lng = 106.66 + (Math.random() - 0.5) * 0.1;
                    
                    const colors = { 'SUBMITTED':'#0EA5E9','GATE1':'#7E22CE','GATE2':'#2563EB','GATE3':'#B45309','FINISH':'#10B981','DRAFT':'#64748B'};
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background:${colors[s.status]||'#333'}; width:24px; height:24px; border-radius:50%; border:3px solid white; box-shadow:0 3px 10px rgba(0,0,0,0.2)"></div>`,
                        iconSize: [24, 24], iconAnchor: [12, 12]
                    });

                    L.marker([lat, lng], {icon}).addTo(window.markerGroup)
                        .bindPopup(`
                            <div style="width:200px">
                                <img src="${s.thumb}" style="width:100%; height:100px; object-fit:cover; border-radius:8px; margin-bottom:10px">
                                <h4 style="margin:0">${data.f1 || s.name}</h4>
                                <p style="font-size:0.8rem; margin:5px 0"><strong>Giá:</strong> ${data.f2_2 || '---'}</p>
                                <span class="status-pill status-${s.status}" style="font-size:0.6rem">${STATUS_LABELS[s.status]}</span>
                                <br><br>
                                <button class="btn-primary" style="width:100%; padding:8px; font-size:0.75rem" onclick="location.hash='#detail?id=${s.id}'">Xem chi tiết</button>
                            </div>
                        `);
                }
            });
        };

        // --- GLOBAL ACTIONS ---
        const resizeImage = (file, callback) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height; const MAX = 800;
                    if (width > height) { if (width > MAX) { height *= MAX / width; width = MAX; } } 
                    else { if (height > MAX) { width *= MAX / height; height = MAX; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.save = (st) => {
            const u = store.getState().user;
            let currentThumb = window.lastB64;
            if (!currentThumb) {
                const imgEl = document.getElementById('p-img');
                if (imgEl && imgEl.src && imgEl.src.startsWith('data:image')) {
                    currentThumb = imgEl.src;
                } else if (window.currentId) {
                    const existingSite = SiteService.getSites().find(s=>s.id===window.currentId);
                    if (existingSite) currentThumb = existingSite.thumb;
                }
            }

            const ans = {};
            FormService.getFields().forEach(f => {
                if (f.type === 'checkboxes') {
                    const checkboxes = document.querySelectorAll(`input[name="${f.id}"]:checked`);
                    ans[f.id] = Array.from(checkboxes).map(cb => cb.value).join(', ');
                } else {
                    const el = document.getElementById(f.id);
                    ans[f.id] = el ? el.value : '';
                }
            });

            if (st === 'SUBMITTED') {
                const missing = [];
                const invalidNum = [];
                FormService.getFields().forEach(f => {
                    const val = ans[f.id] ? ans[f.id].toString().trim() : '';
                    if (f.req && val === '') missing.push(f.label);
                    if (val !== '' && f.num) {
                        const sanitized = val.replace(/,/g, '');
                        if (isNaN(Number(sanitized))) invalidNum.push(f.label);
                    }
                });
                if (!currentThumb || currentThumb.includes('unsplash.com')) {
                    missing.push('Ảnh mặt tiền thật (1 ảnh Thumbnail)');
                }
                
                if (missing.length > 0) {
                    alert('LỖI: Chưa thể nộp hồ sơ!\nBạn cần điền đầy đủ các thông tin bắt buộc sau:\n\n- ' + missing.join('\n- '));
                    return; // Abort
                }
                if (invalidNum.length > 0) {
                    alert('LỖI ĐỊNH DẠNG SỐ!\nCác cột sau BẮT BUỘC PHẢI LÀ SỐ (bạn không được gõ chữ "tr" hay "m2" vào ô này, chỉ gõ số, có thể dùng dấu phẩy cho hàng ngàn):\n\n- ' + invalidNum.join('\n- '));
                    return; // Abort
                }
            }

            const ss = SiteService.getSites();
            const exSite = window.currentId ? ss.find(s => s.id === window.currentId) : null;

            const site = {
                id: window.currentId || Date.now().toString(),
                owner: exSite ? exSite.owner : u.id,
                owner_name: exSite ? exSite.owner_name : u.name,
                region: exSite ? exSite.region : (u.role === 'ADMIN' ? (document.getElementById('admin-region')?.value || 'ALL') : u.region),
                date: exSite ? exSite.date : new Date().toLocaleDateString(),
                status: (st === 'UPDATE_V2' && exSite) ? (exSite.status || 'GATE3') : st,
                thumb: currentThumb || (exSite ? exSite.thumb : 'https://images.unsplash.com/photo-1582410118839-959c86940d99?w=400&h=400'),
                inner_images: window.currentInnerImages || (exSite ? exSite.inner_images : []),
                name: (st === 'UPDATE_V2' && exSite) ? exSite.name : (ans['f1'] || 'Site mới'),
                brand: (st === 'UPDATE_V2' && exSite) ? exSite.brand : (ans['f0'] || '---'),
                price: (st === 'UPDATE_V2' && exSite) ? exSite.price : (parseFloat(ans['f2_2']?.toString().replace(/,/g,'')) || 0),
                answers: (st === 'UPDATE_V2' && exSite) ? JSON.parse(JSON.stringify(exSite.answers)) : JSON.parse(JSON.stringify(ans)),
                v2_data: (st === 'UPDATE_V2') ? JSON.parse(JSON.stringify(ans)) : (exSite ? JSON.parse(JSON.stringify(exSite.v2_data)) : null),
                code: (st === 'SUBMITTED' || st === 'GATE1' || st === 'UPDATE_V2') ? (exSite?.code || 'MB-' + Math.floor(Math.random()*9000+1000)) : (exSite ? exSite.code : '')
            };
            if (SiteService.save(site)) { 
                alert('Đã lưu hồ sơ thành công!'); 
                window.editingV2 = false;
                window.currentId = null;
                location.hash = (st === 'UPDATE_V2') ? '#detail?id='+site.id : '#sites'; 
            }
        };

        window.prevMulti = async (input) => {
            if(!input.files) return;
            window.currentInnerImages = window.currentInnerImages || [];
            const prv = document.getElementById('multi-preview');
            // Reset ui in creation mode
            if(!window.currentId && window.currentInnerImages.length === 0) prv.innerHTML = ''; 
            
            for(let f of input.files) {
                resizeImage(f, (resizedB64) => {
                    window.currentInnerImages.push(resizedB64);
                    const img = document.createElement('img');
                    img.src = resizedB64;
                    img.style = "width:80px; height:80px; object-fit:cover; border-radius:8px; border:1px solid #ddd;";
                    prv.appendChild(img);
                });
            }
        };

        window.prev = (i) => { 
            if(i.files && i.files[0]) { 
                resizeImage(i.files[0], (resizedB64) => {
                    window.lastB64 = resizedB64; 
                    document.getElementById('p-img').src = resizedB64; 
                    document.getElementById('p-ui').style.display='block'; 
                    document.getElementById('h-ui').style.display='none'; 
                });
            }
        };
        window.upStatus = (id, st) => { 
            if(confirm(`Bạn có chắc chắn muốn chuyển trạng thái sang bước [${STATUS_LABELS[st]}]?`)) {
                SiteService.updateStatus(id, st, `Đã chuyển trạng thái sang ${STATUS_LABELS[st]}`); 
                location.reload(); 
            }
        };
        window.siteFilters = { search: '', region: 'ALL', brand: 'ALL', status: 'ALL' };
        window.setFilter = (key, val) => { window.siteFilters[key] = val; handleRoute(); };

        window.doComment = (id) => { const text=document.getElementById('msg').value; if(!text)return; SiteService.addComment(id, text, store.getState().user.name); location.reload(); };
        window.unlock = (id) => { SiteService.updateStatus(id, 'DRAFT', 'Admin đã mở khóa bản ghi.'); alert('Đã mở khóa!'); location.reload(); };
        window.reqEdit = (id) => { const r=prompt('Lý do sửa:'); if(r){ SiteService.addComment(id, `YÊU CẦU SỬA: ${r}`, store.getState().user.name); alert('Đã gửi yêu cầu!'); }};
        window.markAllRead = () => {
            const u = store.getState().user;
            const ns = NotificationService.getNotifs();
            ns.forEach(n => { if(n.uId === u.id) n.isRead = true; });
            localStorage.setItem('site_poc_notifs', JSON.stringify(ns));
            location.reload();
        };
        window.delSite = (id) => { if(confirm('Bạn có chắc chắn muốn xóa hồ sơ mặt bằng này? Hành động này không thể hoàn tác.')) { let ss = JSON.parse(localStorage.getItem('site_poc_sites')) || []; ss = ss.filter(s => s.id !== id); localStorage.setItem('site_poc_sites', JSON.stringify(ss)); location.reload(); }};
        window.addField = () => { const l = prompt('Tên cột:'); if(l){ const t = prompt('Loại (text, select, textarea):','text')||'text'; const fs=FormService.getFields(true); fs.push({id:'f'+Date.now(), label:l, type:t, is_active:true}); FormService.saveFields(fs); handleRoute(); }};
        window.mpsaPrompt = (id) => { const v = prompt('Nhập MPSA mới (Số):'); if(v) { const n = prompt('Ghi chú:'); SiteService.updateMPSA(id, v, n); location.reload(); }};
        window.ver2 = (id) => { if(confirm('Tạo Version 2 từ dữ liệu hiện tại?')){ SiteService.createVersion2(id); alert('Đã tạo V2! Giờ bạn có thể chỉnh sửa Version 2.'); location.reload(); }};
        window.editV2 = (id) => { window.currentId = id; window.editingV2 = true; location.hash = '#create?id=' + id; };
        window.tf = (id, a) => { FormService.updateField(id,{is_active:a}); handleRoute(); };

        window.exportCSV = () => {
            const sites = SiteService.getSites();
            const fields = FormService.getFields();
            const incQA = document.getElementById('include-qa')?.checked;
            const verOpt = document.getElementById('excel-ver')?.value || 'BOTH';
            
            let csv = '\uFEFF'; // BOM for Excel UTF-8
            // Header
            csv += 'ID,Code,Brand,Tên MB,Trạng thái,Vùng miền,Người nộp,Ngày nộp,Version,MPSA Estimate,';
            csv += fields.map(f => f.label.replace(/,/g, '')).join(',');
            if (incQA) csv += ',Lịch sử thảo luận (Q&A)';
            csv += '\n';
            
            sites.forEach(s => {
                const processRow = (data, ver) => {
                    let row = [s.id, s.code, s.brand, s.name, STATUS_LABELS[s.status], s.region, s.owner_name, s.date, ver, s.current_mpsa || '0'];
                    fields.forEach(f => {
                        let val = data[f.id] || '';
                        row.push('"' + val.toString().replace(/"/g, '""') + '"');
                    });
                    if (incQA) {
                        const comments = (s.comments || []).map(c => `[${new Date(c.date).toLocaleDateString()} ${c.author}]: ${c.text}`).join(' | ');
                        row.push('"' + comments.replace(/"/g, '""') + '"');
                    }
                    return row.join(',') + '\n';
                };

                if (verOpt === 'BOTH') {
                    csv += processRow(s.answers || {}, 'V1 (Original)');
                    if (s.v2_data) csv += processRow(s.v2_data, 'V2 (Final)');
                } else {
                    const data = s.v2_data || s.answers || {};
                    csv += processRow(data, s.v2_data ? 'V2 (Final)' : 'V1 (Original)');
                }
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Site_Report_${new Date().toLocaleDateString()}.csv`;
            link.click();
        };

        window.toggleAll = (master) => {
            document.querySelectorAll('.site-checkbox').forEach(cb => cb.checked = master.checked);
        };

        window.printSelected = () => {
            const selectedIds = Array.from(document.querySelectorAll('.site-checkbox:checked')).map(cb => cb.dataset.id);
            if(selectedIds.length === 0) { alert('Vui lòng chọn ít nhất một mặt bằng để in!'); return; }
            
            const win = window.open('', '', 'height=800,width=1000');
            win.document.write('<html><head><title>Báo cáo chọn lọc</title>');
            win.document.write('<style>body{font-family:sans-serif;padding:30px} .page-break{page-break-after:always; border-bottom:2px dashed #eee; padding-bottom:40px; margin-bottom:40px} .header{display:flex;justify-content:space-between;margin-bottom:20px} .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px} .field label{font-weight:bold;font-size:11px;color:#666;display:block} .field p{margin:3px 0;font-size:13px} .thumb-img{width:350px;border-radius:10px;margin-bottom:15px} .images-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:8px} .images-grid img{height:100px;width:100%;object-fit:cover;border-radius:8px} .version-tag{background:#2563EB;color:white;padding:4px 10px;border-radius:4px;font-size:11px} h2{color:#2563EB; font-size:1.2rem; margin-top:20px; border-left:4px solid #2563EB; padding-left:10px}</style>');
            win.document.write('</head><body>');
            
            selectedIds.forEach((id, index) => {
                const site = SiteService.getSites().find(s => s.id === id);
                if(!site) return;

                win.document.write(`<div class="${index < selectedIds.length - 1 ? 'page-break' : ''}">`);
                win.document.write(`<div class="header"><h1>#${index+1}. ${site.name}</h1><div class="version-tag">Mã: ${site.code}</div></div>`);
                win.document.write(`<img src="${site.thumb}" class="thumb-img">`);
                
                const renderSection = (data, title) => {
                    win.document.write(`<h2>${title}</h2><div class="grid">`);
                    FormService.getFields().forEach(f => {
                        const v = data[f.id] || '';
                        win.document.write(`<div class="field"><label>${f.label}</label><p>${v || '---'}</p></div>`);
                    });
                    win.document.write('</div>');
                };

                renderSection(site.answers || {}, 'PHIÊN BẢN GỐC (V1)');
                if(site.v2_data) renderSection(site.v2_data, 'PHIÊN BẢN CHỐT DEAL (V2)');

                if(site.inner_images && site.inner_images.length > 0) {
                    win.document.write('<h3>Hình ảnh chi tiết</h3><div class="images-grid">');
                    site.inner_images.forEach(img => win.document.write(`<img src="${img}">`));
                    win.document.write('</div>');
                }

                if(site.comments && site.comments.length > 0) {
                    win.document.write('<h3>Lịch sử thảo luận</h3>');
                    site.comments.forEach(c => {
                        win.document.write(`<div style="margin-bottom:8px;padding:8px;background:#f5f5f5;border-radius:6px;font-size:12px"><strong>${c.author}</strong>: ${c.text}</div>`);
                    });
                }
                win.document.write('</div>');
            });

            win.document.write('</body></html>');
            win.document.close();
            win.print();
        };

        window.printDetail = (id) => {
            // Re-use printSelected for a single ID to ensure UI consistency
            document.querySelectorAll('.site-checkbox').forEach(cb => cb.checked = false);
            const target = document.querySelector(`.site-checkbox[data-id="${id}"]`);
            if(target) target.checked = true;
            window.printSelected();
        };

        window.login = (role, loc, brand) => {
            const user = { 
                id: (role.toLowerCase()+'-'+loc+(brand ? '-'+brand : '')).toLowerCase(), 
                name: role === 'ADMIN' ? 'Chị Nhi' : (role==='MB'?('Team MB '+loc) : (role==='BOD_L1'?'Sếp BOD Global':(role==='BOD_L2'?('Sếp BOD '+brand):'Team Project'))), 
                role, region: loc, brand 
            };
            localStorage.setItem('site_poc_user', JSON.stringify(user)); location.href = '#dashboard'; location.reload();
        };

        window.doLogin = () => {
            const uInput = document.getElementById('login-user').value;
            const pInput = document.getElementById('login-pass').value;
            const users = UserService.getUsers();
            const valid = users.find(u => u.username === uInput && u.password === pInput);
            if (valid) {
                const uObj = { id: valid.id, name: valid.name, role: valid.role, region: valid.region, brand: valid.brand, email: valid.email };
                localStorage.setItem('site_poc_user', JSON.stringify(uObj));
                location.href = '#dashboard'; location.reload();
            } else {
                alert('Sai tài khoản hoặc mật khẩu!');
            }
        };

        function handleRoute() {
            const u = JSON.parse(localStorage.getItem('site_poc_user'));
            const hash = location.hash.split('?')[0] || (u ? '#dashboard' : '#login');
            
            // Reset states on route change
            if (!location.hash.startsWith('#create')) {
                window.currentId = null;
                window.editingV2 = false;
            }
            const app = document.getElementById('app');

            if(!u) { app.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; height:100vh; background:#F1F5F9; overflow:auto;">
                    <div class="glass" style="width:500px; padding:3rem; border-radius:32px; text-align:center; margin: auto;">
                        <h1 style="color:var(--accent-blue); font-family:var(--font-heading); font-size:2.2rem; margin-bottom:1.5rem">Site Management POC</h1>
                        <form onsubmit="event.preventDefault(); window.doLogin();" style="display:flex; flex-direction:column; gap:15px; margin-bottom:2rem; text-align:left;">
                            <div>
                                <label style="font-size:0.8rem; font-weight:700">Tài khoản (VD: admin)</label>
                                <input type="text" id="login-user" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-top:5px" required>
                            </div>
                            <div>
                                <label style="font-size:0.8rem; font-weight:700">Mật khẩu (VD: 123)</label>
                                <input type="password" id="login-pass" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-top:5px" required>
                            </div>
                            <button type="submit" class="btn-primary" style="margin-top:10px">🚀 Đăng nhập</button>
                        </form>
                        <div style="border-top:1px dashed #ddd; padding-top:1.5rem; margin-bottom:1rem">
                            <p style="font-size:0.85rem; color:#666; font-weight:600; margin-bottom:10px">Hoặc đăng nhập nhanh (Quick Demo):</p>
                        </div>
                        <button onclick="window.login('ADMIN', 'ALL')" class="btn-primary" style="width:100%; margin-bottom:12px">🚪 Đăng nhập ADMIN (Chị Nhi)</button>
                        <div style="display:flex; gap:10px; margin-bottom:12px;">
                            <button onclick="window.login('MB', 'NORTH')" class="btn-primary" style="flex:1; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; padding:0.8rem 0; font-size:0.8rem">🏙️ MB Bắc</button>
                            <button onclick="window.login('MB', 'SOUTH')" class="btn-primary" style="flex:1; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; padding:0.8rem 0; font-size:0.8rem">🏙️ MB Nam</button>
                        </div>
                        <button onclick="window.login('BOD_L1', 'ALL')" class="btn-primary" style="width:100%; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; margin-bottom:12px; font-size:0.9rem">📈 BOD Level 1 (Global)</button>
                        <div style="display:flex; gap:10px; margin-bottom:12px;">
                            <button onclick="window.login('BOD_L2', 'ALL', 'TPC')" class="btn-primary" style="flex:1; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; padding:0.8rem 0; font-size:0.8rem">🍗 BOD TPC</button>
                            <button onclick="window.login('BOD_L2', 'ALL', 'CHANG')" class="btn-primary" style="flex:1; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; padding:0.8rem 0; font-size:0.8rem">🇹🇭 BOD CHANG</button>
                        </div>
                        <div style="display:flex; gap:10px; margin-bottom:12px;">
                            <button onclick="window.login('BOD_L2', 'ALL', 'DQ')" class="btn-primary" style="flex:1; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; padding:0.8rem 0; font-size:0.8rem">🍦 BOD DQ</button>
                            <button onclick="window.login('BOD_L2', 'ALL', 'SW')" class="btn-primary" style="flex:1; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; padding:0.8rem 0; font-size:0.8rem">🥪 BOD SW</button>
                        </div>
                        <button onclick="window.login('PROJECT', 'ALL')" class="btn-primary" style="width:100%; background:#fff; color:#333; box-shadow:none; border:1px solid #ddd; font-size:0.9rem">👷 Team Project</button>
                    </div>
                </div>`; return; }

            app.innerHTML = `
                <div class="layout-container">
                    <nav class="navbar glass">
                        <div style="font-family:var(--font-heading); font-size:1.4rem; font-weight:700; color:var(--accent-blue)">🏢 Site Management Master POC</div>
                        <div style="display:flex; align-items:center; gap:1.5rem">
                            <div style="position:relative; cursor:pointer" onclick="location.hash='#notifs'">
                                <span style="font-size:1.5rem">🔔</span>
                                ${NotificationService.getUnreadCount(u.id) > 0 ? `<span style="position:absolute; top:-5px; right:-5px; background:red; color:white; font-size:0.6rem; padding:2px 5px; border-radius:50%; font-weight:800">${NotificationService.getUnreadCount(u.id)}</span>` : ''}
                            </div>
                            <div style="font-weight:700">${u.name} (${u.role})</div>
                        </div>
                    </nav>
                    <aside class="sidebar glass">
                        <div class="sidebar-menu">
                            <a href="#dashboard" class="menu-item ${hash==='#dashboard'?'active':''}">📊 Dashboard</a>
                            <a href="#sites" class="menu-item ${hash==='#sites'?'active':''}">📍 Danh sách hồ sơ</a>
                            <a href="#map" class="menu-item ${hash==='#map'?'active':''}">🗺️ Bản đồ</a>
                            ${(u.role === 'ADMIN' || u.role === 'MB') ? `<a href="#create" class="menu-item ${hash==='#create'?'active':''}">✍️ Soạn hồ sơ</a>` : ''}
                            ${u.role === 'ADMIN' ? `<a href="#settings" class="menu-item ${hash==='#settings'?'active':''}">⚙️ Quản lý Biểu mẫu</a>` : ''}
                            ${u.role === 'ADMIN' ? `<a href="#users" class="menu-item ${hash==='#users'?'active':''}">👤 Quản lý User</a>` : ''}
                        </div>
                        <button onclick="localStorage.removeItem('site_poc_user'); location.reload();" style="margin-top:auto; color:red; border:none; background:none; cursor:pointer; padding:20px; font-weight:700">Đăng xuất</button>
                    </aside>
                    <main class="main-content" id="m-view"></main>
                </div>`;
            
            const m = document.getElementById('m-view');
            const params = new URLSearchParams(location.hash.split('?')[1]);
            const idParam = params.get('id');

            if(hash === '#create') {
                if (idParam) window.currentId = idParam;
                m.innerHTML = CreateSiteView.render();
            } else if(hash === '#detail') m.innerHTML = DetailView.render();
            else if(hash === '#sites') m.innerHTML = SiteListView.render();
            else if(hash === '#map') { m.innerHTML = MapView.render(); MapView.init(); }
            else if(hash === '#settings') m.innerHTML = SettingsView.render();
            else if(hash === '#users') m.innerHTML = UserManagementView.render();
            else if(hash === '#notifs') {
                const ns = NotificationService.getNotifs().filter(n => n.uId === u.id);
                m.innerHTML = `
                    <div class="animate-fade-in">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem">
                            <h1>🔔 Thông báo của bạn</h1>
                            <div style="display:flex; gap:10px">
                                <button class="btn-ghost" onclick="window.markAllRead()">✔️ Đã đọc tất cả</button>
                                <button class="btn-ghost" style="color:red; border-color:#FEE2E2" onclick="localStorage.removeItem('site_poc_notifs'); location.reload();">🗑️ Xóa hết</button>
                            </div>
                        </div>
                        <div class="glass" style="border-radius:24px; overflow:hidden">
                            ${ns.length === 0 ? '<div style="padding:4rem; text-align:center; color:#ccc">Không có thông báo mới</div>' : ns.map(n => `
                                <div style="padding:1.5rem; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; background:${n.isRead?'white':'#F0F9FF'}; cursor:pointer; transition:0.2s" 
                                     onclick="NotificationService.markRead(${n.id}); location.hash='#detail?id=${n.sId}'">
                                    <div>
                                        <div style="font-weight:700; margin-bottom:0.3rem; color:${n.isRead?'#64748B':'#1E293B'}">${n.msg}</div>
                                        <div style="font-size:0.75rem; color:#999">${new Date(n.date).toLocaleString()}</div>
                                    </div>
                                    ${!n.isRead ? '<div style="width:10px; height:10px; background:var(--accent-blue); border-radius:50%"></div>' : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            } else {
                m.innerHTML = DashboardView.render();
            }
        }
        window.onhashchange = handleRoute;
        window.onload = handleRoute;
    </script>
</body>
</html>
